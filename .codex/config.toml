# Project-local Codex defaults for The House Is Listening.
# Keep this file small and explicit so future runs know which defaults
# belong to this repository rather than the global Codex profile.

model = "gpt-5.4-mini"
model_reasoning_effort = "medium"

[windows]
sandbox = "unelevated"

